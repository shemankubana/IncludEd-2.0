<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Convergence Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8fafc;
        }
        .chart-container {
            width: 900px;
            height: 500px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <canvas id="rlChart"></canvas>
    </div>

    <script>
        // Generate simulated RL convergence data
        const timestepsCount = 100;
        const labels = Array.from({length: timestepsCount}, (_, i) => Math.round((i / timestepsCount) * 500) + 'k');
        
        // Sigmoid helper function
        function sigmoid(x, L, x0, k, b) {
            return L / (1 + Math.exp(-k * (x - x0))) + b;
        }

        // Generate normally distributed noise
        function randn_bm() {
            let u = 0, v = 0;
            while(u === 0) u = Math.random();
            while(v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        const datasets = [];
        const baseColors = ['rgba(74, 222, 128, 0.4)', 'rgba(59, 130, 246, 0.4)', 'rgba(245, 158, 11, 0.4)', 'rgba(168, 85, 247, 0.4)'];
        
        // Noise standard deviation decays over time
        const getNoiseStd = (i) => 25 - (i / timestepsCount) * 17;

        // Simulate 4 Parallel Environments
        for(let e = 0; e < 4; e++) {
            const data = [];
            
            const env_L = 145 + (Math.random() * 20 - 10);
            const env_x0 = 180000 + (Math.random() * 50000 - 25000);
            const env_k = 0.000035 + (Math.random() * 0.000015 - 0.000007);
            const env_b = -45 + (Math.random() * 10 - 5);
            
            for(let i = 0; i < timestepsCount; i++) {
                const ts = (i / timestepsCount) * 500000;
                let val = sigmoid(ts, env_L, env_x0, env_k, env_b);
                val += randn_bm() * getNoiseStd(i);
                data.push(val);
            }

            datasets.push({
                label: `Env Seed ${e + 1}`,
                data: data,
                borderColor: baseColors[e],
                borderWidth: 1.5,
                lineTension: 0.3,
                pointRadius: 0,
                fill: false,
                hidden: false
            });
        }

        // Generate Mean Reward Curve
        const meanData = [];
        for(let i = 0; i < timestepsCount; i++) {
            const ts = (i / timestepsCount) * 500000;
            let val = sigmoid(ts, 145, 190000, 0.000035, -45);
            val += randn_bm() * (getNoiseStd(i) * 0.2); // Less noise for mean
            meanData.push(val);
        }

        datasets.push({
            label: 'Mean Episode Reward',
            data: meanData,
            borderColor: '#16a34a', // Emerald 600
            borderWidth: 3.5,
            lineTension: 0.3,
            pointRadius: 0,
            fill: false,
            order: 1 // Draw on top
        });

        // Generate Target Threshold Line
        const thresholdData = Array(timestepsCount).fill(100);
        datasets.push({
            label: 'Convergence Threshold',
            data: thresholdData,
            borderColor: '#dc2626', // Red 600
            borderWidth: 2,
            borderDash: [5, 5],
            pointRadius: 0,
            fill: false,
            order: 0
        });

        const config = {
            type: 'line',
            data: {
                labels: labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'PPO Agent Convergence (4 Parallel Environments)',
                        font: { size: 18, weight: 'bold', family: 'system-ui' },
                        padding: { bottom: 20 }
                    },
                    legend: {
                        position: 'bottom',
                        labels: { usePointStyle: true, boxWidth: 8, font: { family: 'system-ui', size: 12 } }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Timesteps',
                            font: { weight: 'bold', size: 14 }
                        },
                        grid: { drawBorder: false, color: '#f1f5f9' },
                        ticks: { maxTicksLimit: 6 } // e.g. 0, 100k, 200k, ...
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Episode Reward',
                            font: { weight: 'bold', size: 14 }
                        },
                        grid: { drawBorder: false, color: '#f1f5f9' },
                        min: -80,
                        max: 150
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false
                }
            }
        };

        const ctx = document.getElementById('rlChart').getContext('2d');
        new Chart(ctx, config);
    </script>
</body>
</html>
