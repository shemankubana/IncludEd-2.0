services:
  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: included-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Backend API URL (your Railway backend or Render backend service name)
      - key: VITE_API_URL
        sync: false

      # AI service URL
      - key: VITE_AI_URL
        sync: false

      # Firebase — copy from Firebase Console → Project Settings → Your Apps
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
